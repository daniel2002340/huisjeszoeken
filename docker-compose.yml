services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      # Listen on all interfaces INSIDE the container; exposure to the outside
      # world is controlled by the `ports` binding below (PLAN.md §7).
      HOST: 0.0.0.0
    volumes:
      # SQLite database + backups live on the host, next to the compose file.
      - ./data:/app/data
    ports:
      # Bind to the Tailscale interface ONLY (set TAILSCALE_IP in .env, see
      # DEPLOY.md). Falls back to loopback so a missing var never exposes the
      # dashboard on the LAN.
      - '${TAILSCALE_IP:-127.0.0.1}:${PORT:-3000}:${PORT:-3000}'
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:'+(process.env.PORT||3000)+'/health').then((r)=>process.exit(r.ok?0:1),()=>process.exit(1))"
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 15s
